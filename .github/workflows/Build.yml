name: Build Capella Backup Image

on:
  workflow_dispatch:

# 必须显式声明权限，否则无法推送镜像到 GHCR
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 自动处理小写：使用变量处理确保路径合法
          tags: |
            ghcr.io/${{ github.repository_owner }}/capella-backup:latest
