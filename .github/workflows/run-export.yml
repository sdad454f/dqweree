name: Export Couchbase to R2

on:
  workflow_dispatch: # 手动触发
  # schedule:
  #   - cron: '0 2 * * *' # 每天凌晨2点自动运行

jobs:
  export-and-upload:
    runs-on: ubuntu-latest
    # 使用你刚刚构建好的镜像
    container:
      image: ghcr.io/sdad454f/capella-backup:latest

    steps:
      - name: Export and Upload to R2
        env:
          # Couchbase 变量
          CB_CLUSTER: ${{ secrets.CB_HOST }}
          CB_BUCKET: ${{ secrets.CB_BUCKET }}
          CB_USER: ${{ secrets.CB_USER }}
          CB_PASS: ${{ secrets.CB_PASSWORD }}
          CB_SCOPE: ${{ secrets.CB_SCOPE }}
          # Cloudflare R2 变量
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          # 1. 创建临时证书文件 (如果是 Capella 云端通常需要)
          echo "${{ secrets.CB_CACERT_CONTENT }}" > /tmp/ca.pem

          # 2. 生成文件名
          FILENAME="backup-code-dl.json"

          # 3. 执行导出
          cbexport json \
            --cluster "couchbases://$CB_CLUSTER" \
            --bucket "$CB_USER" \
            --username "$CB_USER" \
            --password "$CB_PASS" \
            --cacert /tmp/ca.pem \
            --format list \
            --output "$FILENAME" \
            --include-key include_key_id \
            --scope-field "$CB_SCOPE" \
            --threads 4

          # 4. 上传到 R2 (这里使用 rclone，如果镜像里没装，可以现场装一个)
          apt-get update && apt-get install -y rclone
          
          export RCLONE_CONFIG_R2_TYPE=s3
          export RCLONE_CONFIG_R2_PROVIDER=Cloudflare
          export RCLONE_CONFIG_R2_ACCESS_KEY_ID="$R2_ACCESS_KEY"
          export RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="$R2_SECRET_KEY"
          export RCLONE_CONFIG_R2_ENDPOINT="$R2_ENDPOINT"
          
          echo "开始上传 $FILENAME 到 R2..."
          rclone copy "$FILENAME" R2:"$R2_BUCKET"/couchbase-backups/
          echo "上传完成！"
